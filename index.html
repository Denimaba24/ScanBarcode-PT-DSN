<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Barcode Pabrik v4.0</title>
    <script src="https://unpkg.com/@zxing/library@0.19.1/bundle/index.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #1e293b;
        }
        header { background-color: var(--primary); color: white; padding: 1rem; text-align: center; }
        header h3 { margin: 0; }
        nav { display: flex; background: var(--card); padding: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100;}
        nav button { flex: 1; background: none; border: none; padding: 10px; font-weight: bold; color: #64748b; cursor: pointer; border-radius: 5px; }
        nav button.active { background: var(--primary); color: white; }
        .container { padding: 1rem; max-width: 800px; margin: auto; }
        .page { display: none; background: var(--card); padding: 1rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .page.active { display: block; }
        
        /* Area Kamera */
        .scanner-container {
            position: relative; width: 100%; height: 300px; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 1rem;
        }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .btn-sync-camera {
            position: absolute; top: 10px; right: 10px; z-index: 10; background: rgba(255,255,255,0.9); border: none; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.3); cursor: pointer;
        }
        .btn-sync-camera svg { width: 24px; height: 24px; fill: #334155; }
        .laser {
            position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: red; box-shadow: 0 0 10px red; animation: scan 2s infinite linear; z-index: 5;
        }
        @keyframes scan { 0% {top: 10%;} 50% {top: 90%;} 100% {top: 10%;} }
        
        /* Error Notif Area Kamera */
        #camError {
            position: absolute; top: 30%; left: 5%; width: 90%; background: rgba(220, 38, 38, 0.9); color: white; text-align: center; padding: 15px; box-sizing: border-box; border-radius: 8px; font-weight: bold; font-size: 0.9rem; display: none; z-index: 20; line-height: 1.4;
        }

        /* Tombol Bantuan Upload Foto */
        .btn-upload {
            background-color: var(--warning); color: white; border: none; padding: 1rem; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 1rem; font-size: 1rem; box-shadow: 0 4px 6px rgba(245, 158, 11, 0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn-trigger {
            background-color: var(--danger); color: white; border: none; padding: 1rem; border-radius: 8px; font-weight: bold; width: 100%; margin-bottom: 1rem; font-size: 1.1rem; box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3); cursor: pointer;
        }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
        .btn { padding: 10px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; min-width: 600px; font-size: 0.85rem; }
        .table-wrap { overflow-x: auto; margin-top: 10px; }
        th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f1f5f9; }
    </style>
</head>
<body>

    <header>
        <h3>Sistem Scanner Pabrik v4.0</h3>
    </header>
    
    <nav>
        <button id="btnMenuScan" class="active" onclick="switchPage('scan')">Kamera Scan</button>
        <button id="btnMenuMaster" onclick="switchPage('master')">Master Barang</button>
    </nav>

    <div class="container">
        <div id="page-scan" class="page active">
            
            <div class="scanner-container">
                <button class="btn-sync-camera" onclick="switchCam()">
                    <svg viewBox="0 0 24 24"><path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/></svg>
                </button>
                <div class="laser"></div>
                <div id="camError"></div>
                <video id="video" autoplay muted playsinline></video>
            </div>

            <input type="file" id="fileInput" accept="image/*" capture="environment" style="display: none;" onchange="handleImageScan(event)">
            <button class="btn-upload" onclick="document.getElementById('fileInput').click()">
                📸 KAMERA ERROR? Klik Disini Untuk Foto/Upload Barcode
            </button>

            <div class="form-group">
                <label>Hasil Tangkapan / Barcode Terbaca</label>
                <input type="text" id="liveCodePreview" placeholder="Menunggu kode barcode..." style="text-align: center; font-weight: bold; color: var(--primary); border: 2px solid var(--primary);">
            </div>

            <button class="btn-trigger" onclick="prosesHitungDanSimpan()">🔴 PENCET UNTUK SIMPAN & HITUNG</button>

            <div class="grid-2">
                <button class="btn" style="background: var(--success);" onclick="exportToExcel()">📥 Export Excel</button>
                <button class="btn" style="background: var(--danger);" onclick="clearScanHistory()">🗑️ Reset</button>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>No</th><th>Kode Barcode</th><th>Panjang</th><th>Lebar</th><th>Jumlah</th><th>Persegi (m²)</th><th>Jam Scan</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyScan"></tbody>
                </table>
            </div>
        </div>

        <div id="page-master" class="page">
            <h4>Database Hasil Rekap Barcode</h4>
            <form onsubmit="saveMasterData(event)">
                <div class="grid-2">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Kode Barcode</label>
                        <input type="text" id="m_kode" required>
                    </div>
                    <div class="form-group"><label>Panjang</label><input type="number" step="0.1" id="m_panjang" required></div>
                    <div class="form-group"><label>Lebar</label><input type="number" step="0.1" id="m_lebar" required></div>
                    <div class="form-group"><label>Jumlah</label><input type="number" id="m_jumlah" required></div>
                    <div class="form-group"><label>Persegi</label><input type="number" step="0.001" id="m_persegi" required></div>
                    <div class="form-group" style="grid-column: span 2;"><label>Golongan</label><input type="text" id="m_golongan" required value="Scan Otomatis"></div>
                </div>
                <button type="submit" class="btn" style="background: var(--primary); width:100%;">Simpan Master</button>
            </form>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>Kode</th><th>P</th><th>L</th><th>Jml</th><th>Persegi</th><th>Aksi</th></tr></thead>
                    <tbody id="tbodyMaster"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let masterData = JSON.parse(localStorage.getItem('masterBarang')) || {};
        let scanHistory = JSON.parse(localStorage.getItem('scanHistory')) || [];
        
        let codeReader;
        let devices = [];
        let currentCam = 0;

        function switchPage(page) {
            document.querySelectorAll('.page, nav button').forEach(el => el.classList.remove('active'));
            if (page === 'scan') {
                document.getElementById('page-scan').classList.add('active');
                document.getElementById('btnMenuScan').classList.add('active');
                startLiveCamera();
            } else {
                document.getElementById('page-master').classList.add('active');
                document.getElementById('btnMenuMaster').classList.add('active');
                if(codeReader) codeReader.reset();
            }
        }

        function showCamError(msg) {
            const errDiv = document.getElementById('camError');
            errDiv.innerHTML = msg + "<br><br>Gunakan tombol kuning 'Foto/Upload Barcode' di bawah sebagai solusinya!";
            errDiv.style.display = 'block';
        }

        // ================= SISTEM KAMERA LIVE =================
        function startLiveCamera() {
            document.getElementById('camError').style.display = 'none';
            
            // Cek apakah diakses lewat file:///
            if(window.location.protocol === 'file:') {
                showCamError("Keamanan HP memblokir kamera karena Anda membuka file ini secara langsung (Offline).");
                return;
            }

            if (!codeReader) codeReader = new ZXing.BrowserMultiFormatReader();

            codeReader.listVideoInputDevices()
                .then(videoInputDevices => {
                    devices = videoInputDevices;
                    if (devices.length > 0) {
                        let backCamIndex = devices.findIndex(d => d.label.toLowerCase().includes('back') || d.label.toLowerCase().includes('environment'));
                        currentCam = backCamIndex !== -1 ? backCamIndex : 0;
                        playVideoStream();
                    } else {
                        showCamError("Tidak ada kamera yang terdeteksi di perangkat Anda.");
                    }
                })
                .catch(err => {
                    console.error(err);
                    showCamError("Izin kamera ditolak oleh browser HP Anda.");
                });
        }

        function playVideoStream() {
            codeReader.reset();
            codeReader.decodeFromVideoDevice(devices[currentCam].deviceId, 'video', (result, err) => {
                if (result) {
                    document.getElementById('liveCodePreview').value = result.text;
                }
            });
        }

        function switchCam() {
            if (devices.length > 1) {
                currentCam = (currentCam + 1) % devices.length;
                playVideoStream();
            }
        }

        // ================= FITUR BARU: SCAN DARI FOTO (ANTI-GAGAL) =================
        function handleImageScan(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!codeReader) codeReader = new ZXing.BrowserMultiFormatReader();
            const imgUrl = URL.createObjectURL(file);
            
            // Beri notifikasi sedang memproses
            document.getElementById('liveCodePreview').value = "Memproses gambar...";

            codeReader.decodeFromImageUrl(imgUrl)
                .then(result => {
                    // Sukses menemukan barcode di gambar
                    document.getElementById('liveCodePreview').value = result.text;
                    alert("Barcode berhasil terbaca dari foto! Silakan tekan tombol MERAH untuk menyimpannya.");
                })
                .catch(err => {
                    console.error(err);
                    document.getElementById('liveCodePreview').value = "";
                    alert("Gagal membaca barcode dari gambar. Pastikan fotonya fokus, tidak blur, dan garis barcode terlihat jelas.");
                });
        }

        // ================= PROSES HITUNG MATEMATIKA =================
        function prosesHitungDanSimpan() {
            const kode = document.getElementById('liveCodePreview').value.trim();
            if (!kode || kode === "Memproses gambar...") {
                alert("Kode barcode kosong! Pastikan kamera/foto sudah mendeteksi barcode.");
                return;
            }

            let panjang = 0, lebar = 0, jumlah = 0, persegi = 0, golongan = "Pabrik / Scan Otomatis";

            // Deteksi Logika Barcode Pabrik Kayu (Gambar 1)
            if (kode.length >= 30 && kode.startsWith("8600")) {
                let len = kode.length;
                jumlah = parseInt(kode.substring(len - 4), 10); 
                lebar = parseFloat(kode.substring(len - 9, len - 4)) / 10; 
                panjang = parseInt(kode.substring(len - 12, len - 9), 10); 
                
                // Rumus: (P x L x Jml) / 10000
                persegi = (panjang * lebar * jumlah) / 10000;
                persegi = Math.round(persegi * 1000) / 1000; 
                golongan = "Tipe " + kode.substring(12, 18);
            } 
            else if (masterData[kode]) { // Jika EAN / Kode biasa dan sudah didaftarkan
                const item = masterData[kode];
                panjang = item.panjang; lebar = item.lebar; jumlah = item.jumlah; persegi = item.persegi; golongan = item.golongan;
            }

            // Update Master
            masterData[kode] = { panjang, lebar, jumlah, persegi, golongan };
            localStorage.setItem('masterBarang', JSON.stringify(masterData));

            // Simpan Riwayat
            const now = new Date();
            const jam = now.toTimeString().split(' ')[0];
            scanHistory.push({ kode, panjang, lebar, jumlah, persegi, tanggal: now.toISOString().split('T')[0], jam, golongan });
            localStorage.setItem('scanHistory', JSON.stringify(scanHistory));
            
            renderTables();
            document.getElementById('liveCodePreview').value = ""; // Reset
            
            if(window.navigator && window.navigator.vibrate) window.navigator.vibrate(200);
            alert(`Sukses tersimpan! Area Persegi: ${persegi} m²`);
        }

        // ================= RENDERING =================
        function renderTables() {
            // Render Scan
            const tbScan = document.getElementById('tbodyScan');
            tbScan.innerHTML = '';
            scanHistory.forEach((r, i) => {
                tbScan.innerHTML += `<tr><td>${i+1}</td><td style="font-size:0.75rem; color:var(--primary); font-weight:bold;">${r.kode}</td><td>${r.panjang}</td><td>${r.lebar}</td><td>${r.jumlah}</td><td style="color:var(--success); font-weight:bold;">${r.persegi} m²</td><td>${r.jam}</td></tr>`;
            });

            // Render Master
            const tbMaster = document.getElementById('tbodyMaster');
            tbMaster.innerHTML = '';
            for (const k in masterData) {
                const i = masterData[k];
                tbMaster.innerHTML += `<tr><td style="font-size:0.7rem; max-width:100px; word-break:break-all;">${k}</td><td>${i.panjang}</td><td>${i.lebar}</td><td>${i.jumlah}</td><td>${i.persegi}</td><td><button onclick="hapusMaster('${k}')" style="background:var(--danger); color:white; border:none; padding:5px; border-radius:3px;">Hapus</button></td></tr>`;
            }
        }

        function saveMasterData(e) {
            e.preventDefault();
            const kode = document.getElementById('m_kode').value.trim();
            masterData[kode] = {
                panjang: document.getElementById('m_panjang').value, lebar: document.getElementById('m_lebar').value, jumlah: document.getElementById('m_jumlah').value, persegi: document.getElementById('m_persegi').value, golongan: document.getElementById('m_golongan').value
            };
            localStorage.setItem('masterBarang', JSON.stringify(masterData));
            e.target.reset(); renderTables(); alert('Master diperbarui!');
        }

        function hapusMaster(k) { if(confirm('Hapus dari master?')){ delete masterData[k]; localStorage.setItem('masterBarang', JSON.stringify(masterData)); renderTables(); } }
        function clearScanHistory() { if(confirm('Hapus riwayat?')){ scanHistory = []; localStorage.setItem('scanHistory', '[]'); renderTables(); } }

        function exportToExcel() {
            if(!scanHistory.length){ alert('Kosong!'); return; }
            let csv = "No,Kode,Panjang,Lebar,Jumlah,Persegi,Tanggal,Jam\n";
            scanHistory.forEach((r, i) => csv += `${i+1},${r.kode},${r.panjang},${r.lebar},${r.jumlah},${r.persegi},${r.tanggal},${r.jam}\n`);
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            link.download = `Rekap_Scan.csv`;
            link.click();
        }

        renderTables();
        setTimeout(startLiveCamera, 500);
    </script>
</body>
</html>
