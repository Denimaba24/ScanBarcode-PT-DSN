<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Scan Barcode Pabrik - Super Responsive</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background-color: var(--primary);
            color: white;
            padding: 1.2rem 1rem;
            text-align: center;
            font-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        header h3 {
            margin: 0;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
        }
        
        nav {
            display: flex;
            background: var(--card-bg);
            padding: 6px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav button {
            flex: 1;
            background: none;
            border: none;
            padding: 0.75rem;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #64748b;
            transition: all 0.2s ease;
        }

        nav button.active {
            background: var(--primary);
            color: white;
        }

        .container {
            padding: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .page {
            display: none;
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);
        }

        .page.active {
            display: block;
        }

        /* Container Kamera Scanner Modern */
        .scanner-wrapper {
            position: relative;
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
            margin-bottom: 1rem;
        }

        #reader {
            width: 100% !important;
            border: none !important;
        }

        #reader video {
            object-fit: cover !important;
        }

        /* Floating Camera Switch Icon */
        .btn-toggle-cam {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.85);
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }

        .btn-toggle-cam:active {
            transform: scale(0.9);
            background: #ffffff;
        }

        .btn-toggle-cam svg {
            width: 22px;
            height: 22px;
            fill: #334155;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #475569;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .action-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .btn {
            border: none;
            padding: 0.85rem 1rem;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: white;
            transition: background 0.2s;
            width: 100%;
        }

        .btn-primary { background-color: var(--primary); }
        .btn-primary:hover { background-color: var(--primary-dark); }
        .btn-success { background-color: var(--success); }
        .btn-danger { background-color: var(--danger); }

        .table-responsive {
            overflow-x: auto;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 650px;
        }

        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        th {
            background-color: #f1f5f9;
            color: #475569;
            font-weight: 600;
        }

        .alert-toast {
            padding: 0.75rem;
            border-radius: 8px;
            background-color: #d1fae5;
            color: #065f46;
            font-weight: 600;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <h3>Sistem Barcode Pabrik Pro</h3>
    </header>
    
    <nav>
        <button id="btnMenuScan" class="active" onclick="switchPage('scan')">Kamera Scan</button>
        <button id="btnMenuMaster" onclick="switchPage('master')">Master Barang</button>
    </nav>

    <div class="container">
        <div id="page-scan" class="page active">
            <div id="alertToast" class="alert-toast"></div>

            <div class="scanner-wrapper">
                <button class="btn-toggle-cam" onclick="toggleCamera()" title="Tukar Kamera">
                    <svg viewBox="0 0 24 24">
                        <path d="M19 8l-4 4h3c0 3.31-2.69 6-6 6-1.01 0-1.97-.25-2.8-.7l-1.46 1.46C8.97 19.54 10.43 20 12 20c4.42 0 8-3.58 8-8h3l-4-4zM6 12c0-3.31 2.69-6 6-6 1.01 0 1.97.25 2.8.7l1.46-1.46C15.03 4.46 13.57 4 12 4c-4.42 0-8 3.58-8 8H1l4 4 4-4H6z"/>
                    </svg>
                </button>
                <div id="reader"></div>
            </div>

            <div class="form-group" style="margin-bottom: 1rem;">
                <input type="text" id="manualInput" placeholder="Hasil Scan / Ketik Manual Kode Di Sini..." style="border: 2px solid var(--primary); text-align: center; font-weight: bold;">
            </div>

            <div class="action-container">
                <button class="btn btn-success" onclick="exportToExcel()">📥 Export Excel</button>
                <button class="btn btn-danger" onclick="clearScanHistory()">🗑️ Reset Scan</button>
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Kode Barcode</th>
                            <th>Panjang</th>
                            <th>Lebar</th>
                            <th>Jml Potongan</th>
                            <th>Persegi</th>
                            <th>Tanggal Scan</th>
                            <th>Jam Scan</th>
                            <th>Golongan</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyScan"></tbody>
                </table>
            </div>
        </div>

        <div id="page-master" class="page">
            <h4 style="margin-top: 0; margin-bottom: 0.5rem;">Database Master Data</h4>
            <form id="formMaster" onsubmit="saveMasterData(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Kode Barcode</label>
                        <input type="text" id="m_kode" required>
                    </div>
                    <div class="form-group">
                        <label>Panjang</label>
                        <input type="number" step="0.01" id="m_panjang" required value="0">
                    </div>
                    <div class="form-group">
                        <label>Lebar</label>
                        <input type="number" step="0.01" id="m_lebar" required value="0">
                    </div>
                    <div class="form-group">
                        <label>Jumlah Potongan</label>
                        <input type="number" id="m_jumlah" required value="0">
                    </div>
                    <div class="form-group">
                        <label>Persegi</label>
                        <input type="number" step="0.01" id="m_persegi" required value="0">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Golongan</label>
                        <input type="text" id="m_golongan" required value="Scan Otomatis">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 5px;">💾 Simpan ke Database</button>
            </form>

            <div class="table-responsive" style="margin-top: 1.5rem;">
                <table>
                    <thead>
                        <tr>
                            <th>Kode Barcode</th>
                            <th>P</th>
                            <th>L</th>
                            <th>Jml</th>
                            <th>Persegi</th>
                            <th>Golongan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyMaster"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let masterData = JSON.parse(localStorage.getItem('masterBarang')) || {};
        let scanHistory = JSON.parse(localStorage.getItem('scanHistory')) || [];
        
        let html5QrCode;
        let isFrontCamera = false; 
        let lastScannedCode = "";
        let lastScanTime = 0;

        function switchPage(page) {
            document.getElementById('page-scan').classList.remove('active');
            document.getElementById('page-master').classList.remove('active');
            document.getElementById('btnMenuScan').classList.remove('active');
            document.getElementById('btnMenuMaster').classList.remove('active');

            if (page === 'scan') {
                document.getElementById('page-scan').classList.add('active');
                document.getElementById('btnMenuScan').classList.add('active');
                startScanner();
            } else {
                document.getElementById('page-master').classList.add('active');
                document.getElementById('btnMenuMaster').classList.add('active');
                stopScanner();
            }
        }

        // ================= ENGINE SCANNER RESOLUSI TINGGI (1080P) =================
        function startScanner() {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            const cameraMode = isFrontCamera ? "user" : { facingMode: "environment" };
            
            // Konfigurasi performa tinggi untuk barcode 1D padat & rapat
            const config = { 
                fps: 30, // Frame rate maksimal
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true // Gunakan engine native hardware HP jika didukung (Sangat cepat)
                }
            };

            // Memaksa kamera menggunakan resolusi Full HD / HD agar garis rapat barcode terbaca jelas
            const localVideoConstraints = {
                facingMode: isFrontCamera ? "user" : "environment",
                width: { ideal: 1920, min: 1280 },
                height: { ideal: 1080, min: 720 }
            };

            html5QrCode.start(
                cameraMode, 
                { fps: config.fps, videoConstraints: localVideoConstraints, experimentalFeatures: config.experimentalFeatures }, 
                onScanSuccess, 
                onScanFailure
            )
            .catch(err => {
                console.error("Kamera gagal dimuat:", err);
            });
        }

        function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => html5QrCode.clear()).catch(err => console.error(err));
            }
        }

        function toggleCamera() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => {
                    isFrontCamera = !isFrontCamera;
                    startScanner();
                });
            } else {
                isFrontCamera = !isFrontCamera;
                startScanner();
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            const currentTime = new Date().getTime();
            
            // Pengaman instan 100ms agar engine tidak crash membaca kode yang sama serentak
            if (decodedText === lastScannedCode && (currentTime - lastScanTime) < 100) {
                return; 
            }

            lastScannedCode = decodedText;
            lastScanTime = currentTime;
            
            document.getElementById('manualInput').value = decodedText;

            if(window.navigator && window.navigator.vibrate){
                window.navigator.vibrate(100); 
            }

            prosesScan(decodedText);
        }

        function onScanFailure(error) {
            // Pengabaian log kegagalan fokus frame demi menjaga kecepatan performa web
        }

        // Memicu pencatatan manual via input field jika diperlukan cepat
        document.getElementById('manualInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const val = this.value.trim();
                if(val) prosesScan(val);
            }
        });

        // ================= INTEGRASI REKAPITULASI DATA =================
        function prosesScan(kode) {
            const now = new Date();
            const tanggal = now.toISOString().split('T')[0];
            const jam = now.toTimeString().split(' ')[0];

            // OTOMATIS MASUK & TERSIMPAN DI MASTER BARANG JIKA BELUM ADA
            if (!masterData[kode]) {
                masterData[kode] = {
                    panjang: 0,
                    lebar: 0,
                    jumlah: 0,
                    persegi: 0,
                    golongan: "Scan Otomatis"
                };
                localStorage.setItem('masterBarang', JSON.stringify(masterData));
                renderMasterTable();
            }

            const item = masterData[kode];

            const scanRecord = {
                kode: kode,
                panjang: item.panjang,
                lebar: item.lebar,
                jumlah: item.jumlah,
                persegi: item.persegi,
                tanggal: tanggal,
                jam: jam,
                golongan: item.golongan
            };

            scanHistory.push(scanRecord);
            localStorage.setItem('scanHistory', JSON.stringify(scanHistory));
            
            renderScanTable();
            showToast(`Sukses Record: ${kode}`);
        }

        function showToast(msg) {
            const toast = document.getElementById('alertToast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function renderScanTable() {
            const tbody = document.getElementById('tbodyScan');
            tbody.innerHTML = '';
            scanHistory.forEach((record, index) => {
                tbody.innerHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td style="word-break: break-all; font-weight: 600; color: var(--primary);">${record.kode}</td>
                        <td>${record.panjang}</td>
                        <td>${record.lebar}</td>
                        <td>${record.jumlah}</td>
                        <td>${record.persegi}</td>
                        <td>${record.tanggal}</td>
                        <td>${record.jam}</td>
                        <td><span style="background: #e2e8f0; padding: 2px 6px; border-radius:4px;">${record.golongan}</span></td>
                    </tr>
                `;
            });
        }

        // ================= TAB MANAGEMENT MASTER =================
        function saveMasterData(e) {
            e.preventDefault();
            const kode = document.getElementById('m_kode').value.trim();
            
            masterData[kode] = {
                panjang: document.getElementById('m_panjang').value,
                lebar: document.getElementById('m_lebar').value,
                jumlah: document.getElementById('m_jumlah').value,
                persegi: document.getElementById('m_persegi').value,
                golongan: document.getElementById('m_golongan').value
            };
            
            localStorage.setItem('masterBarang', JSON.stringify(masterData));
            e.target.reset();
            document.getElementById('m_golongan').value = "Scan Otomatis";
            renderMasterTable();
            alert('Database Berhasil Diupdate!');
        }

        function editMaster(kode){
            const item = masterData[kode];
            document.getElementById('m_kode').value = kode;
            document.getElementById('m_panjang').value = item.panjang;
            document.getElementById('m_lebar').value = item.lebar;
            document.getElementById('m_jumlah').value = item.jumlah;
            document.getElementById('m_persegi').value = item.persegi;
            document.getElementById('m_golongan').value = item.golongan;
        }

        function hapusMaster(kode) {
            if(confirm('Hapus item dari Master?')) {
                delete masterData[kode];
                localStorage.setItem('masterBarang', JSON.stringify(masterData));
                renderMasterTable();
            }
        }

        function renderMasterTable() {
            const tbody = document.getElementById('tbodyMaster');
            tbody.innerHTML = '';
            for (const kode in masterData) {
                const item = masterData[kode];
                tbody.innerHTML += `
                    <tr>
                        <td style="word-break: break-all; max-width: 160px;">${kode}</td>
                        <td>${item.panjang}</td>
                        <td>${item.lebar}</td>
                        <td>${item.jumlah}</td>
                        <td>${item.persegi}</td>
                        <td>${item.golongan}</td>
                        <td>
                            <button style="background:#3b82f6; color:white; border:none; padding:3px 6px; border-radius:4px; cursor:pointer;" onclick="editMaster('${kode}')">Edit</button>
                            <button style="background:var(--danger); color:white; border:none; padding:3px 6px; border-radius:4px; cursor:pointer;" onclick="hapusMaster('${kode}')">Hapus</button>
                        </td>
                    </tr>
                `;
            }
        }

        function clearScanHistory() {
            if(confirm('Hapus seluruh riwayat scan saat ini?')) {
                scanHistory = [];
                localStorage.setItem('scanHistory', JSON.stringify(scanHistory));
                renderScanTable();
            }
        }

        function exportToExcel() {
            if (scanHistory.length === 0) {
                alert('Tidak ada data yang bisa diexport.');
                return;
            }

            let csvContent = "No,Kode Barcode,Panjang,Lebar,Jml Potongan,Persegi,Tanggal Scan,Jam Scan,Golongan\n";
            scanHistory.forEach((row, index) => {
                let rowData = [
                    index + 1,
                    row.kode,
                    row.panjang,
                    row.lebar,
                    row.jumlah,
                    row.persegi,
                    row.tanggal,
                    row.jam,
                    row.golongan
                ].join(",");
                csvContent += rowData + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            const dateStr = new Date().toISOString().split('T')[0];
            link.setAttribute("href", url);
            link.setAttribute("download", `Rekap_Scan_${dateStr}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Inisialisasi awal
        renderMasterTable();
        renderScanTable();
        setTimeout(() => { startScanner(); }, 300);
    </script>
</body>
</html>
